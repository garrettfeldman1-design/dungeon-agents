<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dungeon Agents — Replay Viewer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0e0e0e;
  --bg2:     #161616;
  --bg3:     #1e1e1e;
  --border:  #2a2a2a;
  --text:    #c2c2c2;
  --dim:     #555;
  --accent:  #4a9eff;
  --a1:      #2563eb;
  --a1b:     #60a5fa;
  --a2:      #c2410c;
  --a2b:     #fb923c;
  --key-c:   #ca8a04;
  --door-c:  #b91c1c;
  --exit-c:  #15803d;
  --msg-c:   #7c3aed;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', Courier, monospace;
  font-size: 13px;
  min-width: 900px;
}

/* ── header ── */
header {
  display: flex;
  align-items: baseline;
  gap: 14px;
  padding: 9px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
header h1   { font-size: 12px; letter-spacing: 3px; color: var(--accent); }
header .sub { font-size: 11px; color: var(--dim); }
header .keys { margin-left: auto; font-size: 10px; color: var(--dim); }

/* ── three-column layout ── */
.layout {
  display: grid;
  grid-template-columns: auto 1fr 260px;
  height: calc(100vh - 38px);
  overflow: hidden;
}

/* ── column 1: grid ── */
.col-grid {
  border-right: 1px solid var(--border);
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow-y: auto;
}

.dungeon-grid {
  display: grid;
  grid-template-columns: repeat(8, 48px);
  grid-template-rows: repeat(8, 48px);
  gap: 2px;
  flex-shrink: 0;
}

.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-weight: 700;
  border: 1px solid #111;
  cursor: default;
  user-select: none;
}
.c-wall  { background: #1f1f1f; color: #363636; border-color: #232323; }
.c-empty { background: #121212; color: #252525; }
.c-key   { background: #131100; color: var(--key-c);  border-color: #332900; }
.c-door  { background: #130000; color: var(--door-c); border-color: #2a0000; }
.c-exit  { background: #001308; color: var(--exit-c); border-color: #002010; }
.c-a1    { background: var(--a1); color: #fff; border-color: var(--a1b); }
.c-a2    { background: var(--a2); color: #fff; border-color: var(--a2b); }
.c-both  { background: #5b21b6; color: #fff; border-color: #8b5cf6; }

/* legend */
.legend {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.li {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--dim);
}
.sw {
  width: 12px;
  height: 12px;
  border: 1px solid #333;
  flex-shrink: 0;
}

/* controls */
.controls { display: flex; flex-direction: column; gap: 7px; }
.btn-row  { display: flex; align-items: center; gap: 5px; }

button {
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 4px 10px;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
}
button:hover   { background: #252525; border-color: #444; }
button:disabled { opacity: 0.3; cursor: default; }

#slider {
  flex: 1;
  accent-color: var(--accent);
  height: 4px;
}
.turn-label { font-size: 11px; color: var(--dim); white-space: nowrap; }

/* ── column 2: info ── */
.col-info {
  border-right: 1px solid var(--border);
  padding: 18px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 13px;
}

.panel-heading {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  padding-bottom: 7px;
}

.field { display: flex; flex-direction: column; gap: 3px; }
.fl    { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); }
.fv    { font-size: 13px; line-height: 1.5; }

.badge {
  display: inline-block;
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 1px 8px;
  color: var(--accent);
  font-size: 12px;
}

.reward { font-size: 18px; font-weight: 700; }
.rpos   { color: #4ade80; }
.rneg   { color: var(--dim); }

.reasoning {
  background: var(--bg2);
  border-left: 2px solid var(--border);
  padding: 8px 10px;
  font-size: 11px;
  color: #666;
  line-height: 1.6;
  max-height: 140px;
  overflow-y: auto;
  white-space: pre-wrap;
}

/* message block — the most important event type */
.msg-block {
  border: 1px solid #3b0764;
  background: #0d0718;
  padding: 12px 14px;
}
.msg-header {
  font-size: 10px;
  letter-spacing: 1px;
  color: #a78bfa;
  margin-bottom: 8px;
}
.msg-body {
  font-size: 13px;
  color: #e2e8f0;
  line-height: 1.7;
  white-space: pre-wrap;
}

/* highlight bar */
.hl {
  padding: 6px 10px;
  font-size: 11px;
  border-left: 3px solid;
  line-height: 1.5;
}
.hl-key  { border-color: var(--key-c);  background: #1a1000; color: var(--key-c); }
.hl-door { border-color: var(--door-c); background: #1a0000; color: var(--door-c); }
.hl-exit { border-color: var(--exit-c); background: #001a00; color: var(--exit-c); }
.hl-msg  { border-color: var(--msg-c);  background: #0f0420; color: #a78bfa; }

.no-data { font-size: 12px; color: var(--dim); font-style: italic; }

/* ── column 3: moments ── */
.col-moments {
  padding: 16px 14px;
  overflow-y: auto;
}
.moments-title {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 12px;
}
.mi {
  padding: 7px 9px;
  margin-bottom: 3px;
  cursor: pointer;
  border-left: 2px solid transparent;
  font-size: 11px;
  line-height: 1.5;
  transition: background 0.08s;
}
.mi:hover    { background: var(--bg3); }
.mi.active   { background: var(--bg3); }
.mi-turn     { font-size: 9px; color: var(--dim); margin-bottom: 2px; }
.mi-label    { color: var(--text); }

.mi-key  { border-color: var(--key-c); }
.mi-door { border-color: var(--door-c); }
.mi-exit { border-color: var(--exit-c); }
.mi-msg  { border-color: var(--msg-c); }

.mi-key.active  { background: #1a1000; }
.mi-door.active { background: #1a0000; }
.mi-exit.active { background: #001a00; }
.mi-msg.active  { background: #0f0420; }

/* ── loading overlay ── */
#loading {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg);
  font-size: 13px;
  color: var(--dim);
  gap: 8px;
}
#loading-detail { font-size: 11px; }
</style>
</head>
<body>

<div id="loading">
  loading game_log.json…
  <div id="loading-detail"></div>
</div>

<header>
  <h1>DUNGEON AGENTS</h1>
  <span class="sub">replay viewer</span>
  <span class="keys">← → arrow keys to navigate</span>
</header>

<div class="layout" id="app" style="display:none">

  <!-- column 1: grid -->
  <div class="col-grid">
    <div class="dungeon-grid" id="grid"></div>

    <div class="legend">
      <div class="li"><span class="sw" style="background:#1f1f1f"></span>wall</div>
      <div class="li"><span class="sw" style="background:#131100;border-color:#332900"></span>key</div>
      <div class="li"><span class="sw" style="background:#130000;border-color:#2a0000"></span>door</div>
      <div class="li"><span class="sw" style="background:#001308;border-color:#002010"></span>exit</div>
      <div class="li"><span class="sw" style="background:#2563eb"></span>agent 1</div>
      <div class="li"><span class="sw" style="background:#c2410c"></span>agent 2</div>
    </div>

    <div class="controls">
      <div class="btn-row">
        <button id="btnFirst" onclick="goTo(0)">|◀</button>
        <button id="btnPrev"  onclick="step(-1)">◀ prev</button>
        <button id="btnNext"  onclick="step(+1)">next ▶</button>
        <button id="btnLast"  onclick="goTo(maxTurn)">▶|</button>
      </div>
      <div class="btn-row">
        <input type="range" id="slider" min="0" value="0" oninput="goTo(+this.value)">
        <span class="turn-label" id="turnLabel">—</span>
      </div>
    </div>
  </div>

  <!-- column 2: info panel -->
  <div class="col-info" id="infoPanel">
    <div class="no-data">Use the controls above to step through the game.</div>
  </div>

  <!-- column 3: key moments -->
  <div class="col-moments">
    <div class="moments-title">key moments</div>
    <div id="momentsList"></div>
  </div>

</div>

<script>
// ── Base dungeon layout ────────────────────────────────────────────────────────
// E=empty, W=wall, K=key, D=door, X=exit
const E=0, W=1, K=2, D=3, X=4;

const BASE = [
  [W,W,W,W,W,W,W,W],
  [W,E,E,W,E,E,E,W],
  [W,E,E,W,E,W,E,W],
  [W,W,E,E,K,E,E,W],
  [W,E,E,D,E,E,W,W],
  [W,E,W,W,E,E,E,W],
  [W,E,E,E,E,W,X,W],
  [W,W,W,W,W,W,W,W],
];

// Cell rendering tables (index = cell type; 5=agent1, 6=agent2, 7=both)
const SYM   = ['·','▓','K','D','X','1','2','*'];
const CLS   = ['c-empty','c-wall','c-key','c-door','c-exit','c-a1','c-a2','c-both'];
const TITLE = ['empty','wall','KEY — pick me up!','LOCKED DOOR','EXIT','Agent 1','Agent 2','Both agents'];

// ── App state ─────────────────────────────────────────────────────────────────
let log         = [];   // raw entries from game_log.json
let validLog    = [];   // entries without errors
let worldStates = [];   // one per display-index (0 = initial)
let moments     = [];   // detected key moments
let currentTurn = 0;    // display index 0..maxTurn
let maxTurn     = 0;

// ── World state reconstruction ────────────────────────────────────────────────
function buildWorldStates(entries) {
  const states = [];
  let s = { a1: [1,1], a2: [1,6], keyPresent: true, doorLocked: true };
  states.push(clone(s));

  for (const e of entries) {
    s = clone(s);

    // Update the acting agent's position from next_state
    const pos = e.next_state && e.next_state.position;
    if (pos) {
      if (e.agent_id === 1) s.a1 = pos;
      else                   s.a2 = pos;
    }

    // Key picked up?
    const inv0 = (e.state      && e.state.inventory)      || [];
    const inv1 = (e.next_state && e.next_state.inventory) || [];
    if (inv1.includes('KEY') && !inv0.includes('KEY')) s.keyPresent = false;

    // Door unlocked? reward spike ≥ 4.5 means +5 reward was earned
    if (typeof e.reward === 'number' && e.reward >= 4.5) s.doorLocked = false;

    states.push(s);
  }
  return states;
}

// ── Key moment detection ──────────────────────────────────────────────────────
function detectMoments(entries) {
  const out = [];
  entries.forEach((e, i) => {
    const idx = i + 1;
    const r   = typeof e.reward === 'number' ? e.reward : 0;
    const ag  = e.agent_id;

    if (r >= 0.85 && r < 4.5)
      out.push({ idx, turn: e.turn, type: 'key',
        label: `Agent ${ag} collects the KEY` });

    if (r >= 4.5 && r < 9.5)
      out.push({ idx, turn: e.turn, type: 'door',
        label: `Agent ${ag} unlocks the door` });

    if (r >= 9.5)
      out.push({ idx, turn: e.turn, type: 'exit',
        label: `Agent ${ag} reaches the EXIT` });

    if (e.action && e.action.tool_called === 'send_message') {
      const args = e.action.tool_args || {};
      const preview = (args.message || '').slice(0, 38);
      out.push({ idx, turn: e.turn, type: 'msg',
        label: `Agent ${ag}→${args.recipient}: "${preview}${args.message && args.message.length > 38 ? '…' : ''}"` });
    }
  });
  return out;
}

// ── Grid rendering ────────────────────────────────────────────────────────────
function buildGrid(idx) {
  const s    = worldStates[idx];
  const grid = BASE.map(row => [...row]);

  if (!s.keyPresent) grid[3][4] = E;
  if (!s.doorLocked) grid[4][3] = E;

  const [r1,c1] = s.a1;
  const [r2,c2] = s.a2;
  if (r1 === r2 && c1 === c2) {
    grid[r1][c1] = 7;
  } else {
    grid[r1][c1] = 5;
    grid[r2][c2] = 6;
  }
  return grid;
}

function renderGrid(idx) {
  const grid      = buildGrid(idx);
  const container = document.getElementById('grid');
  container.innerHTML = '';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const ct  = grid[r][c];
      const div = document.createElement('div');
      div.className   = `cell ${CLS[ct]}`;
      div.textContent = SYM[ct];
      div.title       = `(${r},${c}) ${TITLE[ct] || ''}`;
      container.appendChild(div);
    }
  }
}

// ── Info panel ────────────────────────────────────────────────────────────────
function renderInfo(idx) {
  const panel = document.getElementById('infoPanel');

  if (idx === 0) {
    const ws = worldStates[0];
    panel.innerHTML = `
      <div class="panel-heading">INITIAL STATE</div>
      <div class="field"><div class="fl">agent 1</div><div class="fv">position ${fmtPos(ws.a1)}</div></div>
      <div class="field"><div class="fl">agent 2</div><div class="fv">position ${fmtPos(ws.a2)}</div></div>
      <div class="field"><div class="fl">world</div><div class="fv">Key present · Door locked · ${validLog.length} total turns logged</div></div>
    `;
    return;
  }

  const e   = validLog[idx - 1];
  const r   = typeof e.reward === 'number' ? e.reward : 0;
  const pos = e.next_state && e.next_state.position;
  const inv = e.next_state && e.next_state.inventory || [];
  const act = e.action || {};
  const args = act.tool_args || {};

  // Moment highlight bar
  const moment = moments.find(m => m.idx === idx);
  const hlHtml = moment ? `
    <div class="hl hl-${moment.type}">${momentIcon(moment.type)} ${esc(moment.label)}</div>` : '';

  // Message section (most prominent event type)
  let msgHtml = '';
  if (act.tool_called === 'send_message') {
    msgHtml = `
      <div class="field">
        <div class="fl">message content</div>
        <div class="msg-block">
          <div class="msg-header">AGENT ${e.agent_id} → AGENT ${args.recipient || '?'}</div>
          <div class="msg-body">${esc(args.message || '')}</div>
        </div>
      </div>`;
  }

  // Args display (skip for no-arg tools)
  const argPairs = Object.entries(args);
  const argsHtml = argPairs.length ? argPairs.map(([k,v]) =>
    `<span style="color:var(--dim)">${k}</span> = ${esc(JSON.stringify(v))}`
  ).join('&nbsp;&nbsp;·&nbsp;&nbsp;') : '<span style="color:var(--dim)">—</span>';

  // Reasoning (collapsed if empty)
  const reasoning = (act.reasoning || '').trim();
  const reasonHtml = reasoning ? `
    <div class="field">
      <div class="fl">reasoning</div>
      <div class="reasoning">${esc(reasoning)}</div>
    </div>` : '';

  // Reward formatting
  const rewardSign = r > 0 ? '+' : '';
  const rewardCls  = r >= 0.5 ? 'rpos' : 'rneg';

  // Cumulative reward (sum up to this point)
  let cumReward = 0;
  for (let i = 0; i < idx; i++) {
    if (validLog[i].agent_id === e.agent_id)
      cumReward += validLog[i].reward || 0;
  }
  cumReward = Math.round(cumReward * 1000) / 1000;

  panel.innerHTML = `
    ${hlHtml}
    <div class="panel-heading">TURN ${e.turn} &nbsp;·&nbsp; AGENT ${e.agent_id}</div>

    <div class="field">
      <div class="fl">action</div>
      <div class="fv"><span class="badge">${esc(act.tool_called || '—')}</span></div>
    </div>

    <div class="field">
      <div class="fl">arguments</div>
      <div class="fv">${argsHtml}</div>
    </div>

    <div class="field">
      <div class="fl">result</div>
      <div class="fv">${esc(e.result || '—')}</div>
    </div>

    ${msgHtml}

    <div class="field">
      <div class="fl">reward this turn</div>
      <div class="reward ${rewardCls}">${rewardSign}${r.toFixed(3)}</div>
    </div>

    <div class="field">
      <div class="fl">agent ${e.agent_id} cumulative reward</div>
      <div class="fv">${cumReward >= 0 ? '+' : ''}${cumReward.toFixed(3)}</div>
    </div>

    ${reasonHtml}

    <div class="field">
      <div class="fl">position after</div>
      <div class="fv">${pos ? fmtPos(pos) : '—'}</div>
    </div>

    <div class="field">
      <div class="fl">inventory after</div>
      <div class="fv">${inv.length ? inv.join(', ') : 'empty'}</div>
    </div>
  `;
}

// ── Moments sidebar ───────────────────────────────────────────────────────────
function renderMomentsList() {
  const list = document.getElementById('momentsList');
  if (!moments.length) {
    list.innerHTML = '<div class="no-data">None detected yet.</div>';
    return;
  }
  list.innerHTML = moments.map(m => `
    <div class="mi mi-${m.type} ${currentTurn === m.idx ? 'active' : ''}"
         onclick="goTo(${m.idx})">
      <div class="mi-turn">turn ${m.turn}</div>
      <div class="mi-label">${momentIcon(m.type)} ${esc(m.label)}</div>
    </div>`).join('');
}

// ── Navigation ────────────────────────────────────────────────────────────────
function goTo(idx) {
  currentTurn = Math.max(0, Math.min(maxTurn, +idx));
  document.getElementById('slider').value = currentTurn;

  const lbl = currentTurn === 0
    ? 'initial state'
    : `${currentTurn} / ${maxTurn}`;
  document.getElementById('turnLabel').textContent = lbl;

  document.getElementById('btnPrev').disabled  = currentTurn === 0;
  document.getElementById('btnFirst').disabled = currentTurn === 0;
  document.getElementById('btnNext').disabled  = currentTurn === maxTurn;
  document.getElementById('btnLast').disabled  = currentTurn === maxTurn;

  renderGrid(currentTurn);
  renderInfo(currentTurn);
  renderMomentsList();
}

function step(d) { goTo(currentTurn + d); }

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft')  step(-1);
  if (e.key === 'ArrowRight') step(+1);
  if (e.key === 'Home')       goTo(0);
  if (e.key === 'End')        goTo(maxTurn);
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function clone(o)    { return JSON.parse(JSON.stringify(o)); }
function esc(s)      { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtPos(p)   { return Array.isArray(p) ? `(${p[0]}, ${p[1]})` : String(p); }
function momentIcon(t) { return {key:'🗝',door:'🔓',exit:'🏁',msg:'💬'}[t] || '·'; }

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  const detail = document.getElementById('loading-detail');
  try {
    const res = await fetch('game_log.json');
    if (!res.ok) throw new Error(`HTTP ${res.status} — make sure game_log.json is in the same folder`);
    log = await res.json();
  } catch (err) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#dc2626">⚠ ${esc(err.message)}</div>
       <div style="font-size:11px;color:var(--dim);margin-top:6px">Open this file via a local server or place game_log.json alongside viewer.html</div>`;
    return;
  }

  // Filter out error entries (they lack next_state)
  validLog = log.filter(e => e.next_state);
  detail.textContent = `${validLog.length} turns loaded`;

  worldStates = buildWorldStates(validLog);
  moments     = detectMoments(validLog);
  maxTurn     = validLog.length;

  const slider = document.getElementById('slider');
  slider.max   = maxTurn;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display     = 'grid';

  renderMomentsList();
  goTo(0);
})();
</script>
</body>
</html>
