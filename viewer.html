<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dungeon Agents — Replay Viewer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0d1117;
  --bg2:    #161b22;
  --bg3:    #1c2128;
  --border: #30363d;
  --text:   #c9d1d9;
  --dim:    #484f58;
  --dim2:   #6e7681;
  --accent: #4a9eff;
  --a1:     #4a9eff;
  --a1hi:   #79b8ff;
  --a2:     #ff7b2e;
  --a2hi:   #ffab70;
  --key-c:  #f0a500;
  --door-c: #8b0000;
  --exit-c: #1a7a1a;
  --msg-c:  #7c3aed;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', Courier, monospace;
  font-size: 13px;
  min-width: 980px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── header ────────────────────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 8px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
header h1  { font-size: 12px; letter-spacing: 3px; color: var(--accent); }
.sub       { font-size: 11px; color: var(--dim2); }
.hkeys     { margin-left: auto; font-size: 10px; color: var(--dim); }

/* ── three-column layout ───────────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: auto 1fr 286px;
  flex: 1;
  overflow: hidden;
}

/* ── col 1: grid ───────────────────────────────────────────────────────────── */
.col-grid {
  border-right: 1px solid var(--border);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 13px;
  overflow-y: auto;
  flex-shrink: 0;
}

/* Grid wrapper — holds the cell grid + SVG trail overlay */
.grid-wrap {
  position: relative;
  width: 398px;
  height: 398px;
  flex-shrink: 0;
}

.dungeon-grid {
  display: grid;
  grid-template-columns: repeat(8, 48px);
  grid-template-rows:    repeat(8, 48px);
  gap: 2px;
}

.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  border: 1px solid #21262d;
  user-select: none;
}
.c-empty         { background: #161b22; color: #2d333b; }
.c-empty-visited { background: #1c2a3a; color: #2d3f52; }
.c-wall          { background: #0a0a0a; color: #141414; border-color: #111; }
.c-key   { background: #1a1200; color: var(--key-c);  border-color: #3a2800; }
.c-door  { background: #160000; color: var(--door-c); border-color: #330000; }
.c-exit  { background: #001400; color: var(--exit-c); border-color: #002800; }
.c-a1    { background: var(--a1); color: #fff; border-color: var(--a1hi); }
.c-a2    { background: var(--a2); color: #fff; border-color: var(--a2hi); }
.c-both  { background: #5b21b6; color: #fff; border-color: #8b5cf6; }

/* SVG trail overlay sits above cells, ignores mouse */
.trail-svg {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
}

/* Legend */
.legend {
  display: flex;
  gap: 9px;
  flex-wrap: wrap;
}
.li { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--dim2); }
.sw { width: 11px; height: 11px; border: 1px solid #333; flex-shrink: 0; }

/* Controls */
.controls { display: flex; flex-direction: column; gap: 6px; }
.btn-row  { display: flex; align-items: center; gap: 5px; }
button {
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 4px 10px;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
}
button:hover   { background: #222; border-color: #3a3a3a; }
button:disabled { opacity: 0.25; cursor: default; }
#slider {
  flex: 1;
  accent-color: var(--accent);
}
.turn-label  { font-size: 11px; color: var(--dim2); white-space: nowrap; }
.fog-toggle {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--dim2);
  cursor: pointer;
  user-select: none;
}
.fog-toggle input { accent-color: var(--accent); cursor: pointer; }
.speed-label { font-size: 10px; color: var(--dim);  margin-right: 2px; }
.speed-opt {
  font-size: 11px;
  color: var(--dim2);
  cursor: pointer;
  padding: 2px 5px;
  border: 1px solid transparent;
}
.speed-opt:hover  { color: var(--text); }
.speed-opt.active { color: var(--accent); border-color: var(--border); }

/* Stats bar */
.stats-bar {
  font-size: 10px;
  color: var(--dim2);
  line-height: 1.7;
  letter-spacing: 0.02em;
}
.stats-bar .sl { color: var(--dim); }
.stats-bar .va1 { color: var(--a1hi); }
.stats-bar .va2 { color: var(--a2hi); }

/* ── col 2: info ───────────────────────────────────────────────────────────── */
.col-info {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* One-line plain-English summary pinned at the top */
.turn-summary {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 7px 16px;
  font-size: 12px;
  color: var(--accent);
  flex-shrink: 0;
  min-height: 30px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.summary-agent1 { color: var(--a1hi); }
.summary-agent2 { color: var(--a2hi); }

/* Scrollable info body */
.info-inner {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 11px;
}

.panel-head {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
}

.field { display: flex; flex-direction: column; gap: 2px; }
.fl    { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim2); }
.fv    { font-size: 13px; line-height: 1.5; }

.badge {
  display: inline-block;
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 1px 8px;
  color: var(--accent);
  font-size: 12px;
}

.reward     { font-size: 18px; font-weight: 700; }
.reward-pos { color: #4ade80; }
.reward-neg { color: var(--dim2); }

.reasoning {
  background: var(--bg2);
  border-left: 2px solid var(--border);
  padding: 7px 10px;
  font-size: 11px;
  color: #585858;
  line-height: 1.7;
  max-height: 130px;
  overflow-y: auto;
  white-space: pre-wrap;
}

/* Highlight bars */
.hl {
  padding: 5px 10px;
  font-size: 11px;
  border-left: 3px solid;
  line-height: 1.5;
}
.hl-key  { border-color: var(--key-c);  background: #130f00; color: var(--key-c); }
.hl-door { border-color: var(--door-c); background: #120000; color: var(--door-c); }
.hl-exit { border-color: var(--exit-c); background: #001108; color: var(--exit-c); }
.hl-msg  { border-color: var(--msg-c);  background: #0d0520; color: #a78bfa; }

/* Speech bubble — for send_message turns */
.speech-bubble {
  position: relative;
  background: #0c0618;
  border: 1px solid #4c1d95;
  padding: 12px 14px;
  margin-top: 2px;
}
/* triangle pointing up (speaker is above/on the grid) */
.speech-bubble::before {
  content: '';
  position: absolute;
  top: -8px;
  left: 14px;
  border: 4px solid transparent;
  border-bottom-color: #4c1d95;
}
.speech-bubble::after {
  content: '';
  position: absolute;
  top: -6px;
  left: 15px;
  border: 3px solid transparent;
  border-bottom-color: #0c0618;
}
.bubble-from {
  font-size: 10px;
  letter-spacing: 1px;
  color: #7c3aed;
  margin-bottom: 8px;
}
.bubble-text {
  font-size: 13px;
  color: #e2d9f3;
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-word;
}

.no-data { font-size: 12px; color: var(--dim2); font-style: italic; }

/* ── col 3: chart + moments ────────────────────────────────────────────────── */
.col-right {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chart-section {
  border-bottom: 1px solid var(--border);
  padding: 12px 14px;
  flex-shrink: 0;
}
.chart-title {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--dim2);
  margin-bottom: 8px;
}
.chart-legend {
  display: flex;
  gap: 14px;
  margin-top: 6px;
  font-size: 10px;
}
.cl-a1 { color: var(--a1hi); }
.cl-a2 { color: var(--a2hi); }

.moments-section {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
}
.moments-title {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 10px;
}
.mi {
  padding: 6px 8px;
  margin-bottom: 3px;
  cursor: pointer;
  border-left: 2px solid transparent;
  font-size: 11px;
  line-height: 1.5;
  transition: background 0.08s;
}
.mi:hover  { background: var(--bg3); }
.mi.active { background: var(--bg3); }
.mi-turn   { font-size: 9px; color: var(--dim2); margin-bottom: 1px; }

.mi-key  { border-color: var(--key-c); }
.mi-door { border-color: var(--door-c); }
.mi-exit { border-color: var(--exit-c); }
.mi-msg  { border-color: var(--msg-c); }
.mi-key.active  { background: #130f00; }
.mi-door.active { background: #120000; }
.mi-exit.active { background: #001108; }
.mi-msg.active  { background: #0d0520; }

/* ── loading ───────────────────────────────────────────────────────────────── */
#loading {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg);
  font-size: 13px;
  color: var(--dim2);
  gap: 7px;
}
</style>
</head>
<body>

<div id="loading">
  loading game_log.json…
  <div id="ld2" style="font-size:11px"></div>
</div>

<header>
  <h1>DUNGEON AGENTS</h1>
  <span class="sub">replay viewer</span>
  <span class="hkeys">← → arrow keys &nbsp;|&nbsp; Home / End</span>
</header>

<div class="layout" id="app" style="display:none">

  <!-- col 1: dungeon grid -->
  <div class="col-grid">
    <div class="grid-wrap">
      <div class="dungeon-grid" id="grid"></div>
      <svg id="fogSvg"   class="trail-svg" width="398" height="398"></svg>
      <svg id="trailSvg" class="trail-svg" width="398" height="398"></svg>
    </div>

    <div class="legend">
      <div class="li"><span class="sw" style="background:#0a0a0a;border-color:#111"></span>wall</div>
      <div class="li"><span class="sw" style="background:#130f00;border-color:#2e2000"></span>key</div>
      <div class="li"><span class="sw" style="background:#120000;border-color:#280000"></span>door</div>
      <div class="li"><span class="sw" style="background:#001108;border-color:#001e10"></span>exit</div>
      <div class="li"><span class="sw" style="background:#2563eb"></span>agent 1</div>
      <div class="li"><span class="sw" style="background:#c2410c"></span>agent 2</div>
      <div class="li"><span style="font-size:9px;color:var(--dim2)">faded = trail</span></div>
    </div>

    <div class="controls">
      <div class="btn-row">
        <button id="btnFirst" onclick="goTo(0)">|◀</button>
        <button id="btnPrev"  onclick="stepAndPause(-1)">◀ prev</button>
        <button id="btnPlay"  onclick="togglePlay()">▶ play</button>
        <button id="btnNext"  onclick="stepAndPause(+1)">next ▶</button>
        <button id="btnLast"  onclick="goTo(maxTurn)">▶|</button>
      </div>
      <div class="btn-row">
        <input type="range" id="slider" min="0" value="0" oninput="pause(); goTo(+this.value)">
        <span class="turn-label" id="turnLabel">—</span>
      </div>
      <div class="btn-row">
        <span class="speed-label">speed</span>
        <span class="speed-opt"        data-ms="1500" onclick="setSpeed(this)">slow</span>
        <span class="speed-opt active" data-ms="800"  onclick="setSpeed(this)">normal</span>
        <span class="speed-opt"        data-ms="300"  onclick="setSpeed(this)">fast</span>
      </div>
      <div class="btn-row">
        <label class="fog-toggle">
          <input type="checkbox" id="fogToggle" checked onchange="renderGrid(currentTurn)">
          fog of war
        </label>
      </div>
    </div>

    <div class="stats-bar" id="statsBar">—</div>
  </div>

  <!-- col 2: turn summary + info panel -->
  <div class="col-info">
    <div class="turn-summary" id="turnSummary">—</div>
    <div class="info-inner" id="infoPanel">
      <div class="no-data">Step through turns using the controls on the left.</div>
    </div>
  </div>

  <!-- col 3: reward chart + key moments -->
  <div class="col-right">
    <div class="chart-section">
      <div class="chart-title">CUMULATIVE REWARD</div>
      <svg id="rewardChart" width="258" height="115"
           style="display:block;background:#0d1117"></svg>
      <div class="chart-legend">
        <span class="cl-a1">▬ agent 1</span>
        <span class="cl-a2">▬ agent 2</span>
      </div>
    </div>
    <div class="moments-section">
      <div class="moments-title">key moments</div>
      <div id="momentsList"></div>
    </div>
  </div>

</div>

<script>
// ── Dungeon base layout ────────────────────────────────────────────────────────
// 0=empty 1=wall 2=key 3=door 4=exit
const E=0, W=1, K=2, D=3, X=4;
const BASE = [
  [W,W,W,W,W,W,W,W],
  [W,E,E,W,E,E,E,W],
  [W,E,E,W,E,W,E,W],
  [W,W,E,E,K,E,E,W],
  [W,E,E,D,E,E,W,W],
  [W,E,W,W,E,E,E,W],
  [W,E,E,E,E,W,X,W],
  [W,W,W,W,W,W,W,W],
];

// cell type → CSS class and symbol  (indices 5=a1, 6=a2, 7=both)
const CLS = ['c-empty','c-wall','c-key','c-door','c-exit','c-a1','c-a2','c-both'];
const SYM = ['·','▓','K','D','X','1','2','*'];
const TTL = ['empty','wall','KEY — pick me up!','LOCKED DOOR','EXIT','Agent 1','Agent 2','both agents'];

// Grid geometry constants
const STRIDE = 50;   // 48px cell + 2px gap
const HALF   = 24;   // center offset within cell

// ── App state ──────────────────────────────────────────────────────────────────
let validLog    = [];   // log entries without errors
let worldStates = [];   // one entry per display-index (0 = initial)
let cumRewards  = null; // { a1: number[], a2: number[] }
let moments     = [];
let currentTurn = 0;
let maxTurn     = 0;

// ── World state precomputation ─────────────────────────────────────────────────
function buildWorldStates(entries) {
  const states = [];
  // visited: Set of "r,c" strings for all cells either agent has stood on
  let s = {
    a1: [1,1], a2: [1,6],
    a1Trail: [], a2Trail: [],   // up to last 5 past positions
    keyPresent: true,
    doorLocked: true,
    visited: ['1,1', '1,6'],   // array of "r,c" strings; clone-safe
  };
  states.push(clone(s));

  for (const e of entries) {
    s = clone(s);
    const pos = e.next_state && e.next_state.position;
    if (pos) {
      if (e.agent_id === 1) {
        s.a1Trail = [...s.a1Trail, s.a1].slice(-5);
        s.a1 = pos;
      } else {
        s.a2Trail = [...s.a2Trail, s.a2].slice(-5);
        s.a2 = pos;
      }
    }
    // Key collected?
    const inv0 = ((e.state      || {}).inventory || []);
    const inv1 = ((e.next_state || {}).inventory || []);
    if (inv1.includes('KEY') && !inv0.includes('KEY')) s.keyPresent = false;
    // Door unlocked?
    if (typeof e.reward === 'number' && e.reward >= 4.5) s.doorLocked = false;
    // Visited cells — accumulate both agents' next_state positions
    if (pos) {
      const key = `${pos[0]},${pos[1]}`;
      if (!s.visited.includes(key)) s.visited = [...s.visited, key];
    }
    // Also mark cells visible to the acting agent (current cell + 4 neighbours)
    // so "look" turns reveal the surroundings in the fog
    const agPos = e.agent_id === 1 ? s.a1 : s.a2;
    for (const [dr, dc] of [[0,0],[-1,0],[1,0],[0,-1],[0,1]]) {
      const vr = agPos[0] + dr, vc = agPos[1] + dc;
      if (vr >= 0 && vr < 8 && vc >= 0 && vc < 8) {
        const vk = `${vr},${vc}`;
        if (!s.visited.includes(vk)) s.visited = [...s.visited, vk];
      }
    }
    states.push(s);
  }
  return states;
}

// ── Cumulative rewards ─────────────────────────────────────────────────────────
function buildCumulativeRewards(entries) {
  const a1 = new Array(entries.length + 1);
  const a2 = new Array(entries.length + 1);
  let c1 = 0, c2 = 0;
  a1[0] = 0; a2[0] = 0;
  for (let i = 0; i < entries.length; i++) {
    const e = entries[i];
    if (e.agent_id === 1) c1 += (e.reward || 0);
    else                   c2 += (e.reward || 0);
    a1[i+1] = round3(c1);
    a2[i+1] = round3(c2);
  }
  return { a1, a2 };
}

// ── Key moment detection ───────────────────────────────────────────────────────
function detectMoments(entries) {
  return entries.flatMap((e, i) => {
    const idx = i + 1;
    const r   = e.reward || 0;
    const ag  = e.agent_id;
    const out = [];
    if (r >= 0.85 && r < 4.5)
      out.push({ idx, turn: e.turn, type: 'key',
        label: `Agent ${ag} collects the KEY` });
    if (r >= 4.5 && r < 9.5)
      out.push({ idx, turn: e.turn, type: 'door',
        label: `Agent ${ag} unlocks the door` });
    if (r >= 9.5)
      out.push({ idx, turn: e.turn, type: 'exit',
        label: `Agent ${ag} reaches the EXIT` });
    if (e.action && e.action.tool_called === 'send_message') {
      const args = e.action.tool_args || {};
      const preview = (args.message || '').slice(0, 36);
      out.push({ idx, turn: e.turn, type: 'msg',
        label: `Agent ${ag}→${args.recipient}: "${preview}${args.message && args.message.length > 36 ? '…' : ''}"` });
    }
    return out;
  });
}

// ── Plain-English turn summary ─────────────────────────────────────────────────
function makeSummary(e) {
  if (!e) return '—';
  const ag   = e.agent_id;
  const tool = (e.action && e.action.tool_called) || '';
  const args = (e.action && e.action.tool_args)   || {};
  const res  = (e.result || '').toLowerCase();

  switch (tool) {
    case 'move':
      return { ag, text: `moved ${args.direction || ''}` };
    case 'look':
      return { ag, text: 'looked around' };
    case 'check_coordinates':
      return { ag, text: 'checked their coordinates' };
    case 'check_inventory':
      return { ag, text: 'checked their inventory' };
    case 'pick_up_item':
      if (res.includes('key'))     return { ag, text: 'picked up the KEY' };
      if (res.includes('nothing') || res.includes('no item'))
                                   return { ag, text: 'tried to pick up an item — nothing there' };
      return { ag, text: 'picked up an item' };
    case 'use_item':
      if (res.includes('unlock'))  return { ag, text: 'unlocked the door' };
      if (res.includes("can't") || res.includes('cannot') || res.includes("doesn't"))
                                   return { ag, text: `tried to use ${args.item || 'item'} — failed` };
      return { ag, text: `used ${args.item || 'item'} on (${(args.target||[]).join(', ')})` };
    case 'send_message':
      return { ag, text: `sent a message to Agent ${args.recipient}` };
    default:
      return { ag, text: `called ${tool || '?'}` };
  }
}

// ── Grid rendering ─────────────────────────────────────────────────────────────
function buildGridData(idx) {
  const s    = worldStates[idx];
  const grid = BASE.map(row => [...row]);
  if (!s.keyPresent) grid[3][4] = E;
  if (!s.doorLocked) grid[4][3] = E;
  const [r1,c1] = s.a1;
  const [r2,c2] = s.a2;
  if (r1===r2 && c1===c2) { grid[r1][c1] = 7; }
  else { grid[r1][c1] = 5; grid[r2][c2] = 6; }
  return grid;
}

function renderGrid(idx) {
  const grid  = buildGridData(idx);
  const el    = document.getElementById('grid');
  el.innerHTML = '';
  const visited = new Set(worldStates[idx].visited);
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const ct  = grid[r][c];
      const div = document.createElement('div');
      const baseCls = CLS[ct] === 'c-empty' && visited.has(`${r},${c}`)
        ? 'c-empty-visited' : CLS[ct];
      div.className   = `cell ${baseCls}`;
      div.textContent = SYM[ct];
      div.title       = `(${r},${c})  ${TTL[ct]}`;
      el.appendChild(div);
    }
  }
  renderFog(idx);
  renderTrail(idx);
}

function renderFog(idx) {
  const svg     = document.getElementById('fogSvg');
  const enabled = document.getElementById('fogToggle').checked;
  if (!enabled) { svg.innerHTML = ''; return; }

  const visited = new Set(worldStates[idx].visited);
  const rects   = [];
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (!visited.has(`${r},${c}`)) {
        const x = c * STRIDE, y = r * STRIDE;
        rects.push(`<rect x="${x}" y="${y}" width="48" height="48"
                          fill="#0d1117" opacity="0.75"/>`);
      }
    }
  }
  svg.innerHTML = rects.join('');
}

function renderTrail(idx) {
  const s   = worldStates[idx];
  const svg = document.getElementById('trailSvg');

  function circles(trail, color) {
    const n = trail.length;
    return trail.map((pos, i) => {
      // opacity ramps from 0.07 (oldest) to 0.38 (most recent past)
      const opacity = n <= 1 ? 0.25 : 0.07 + (i / (n - 1)) * 0.31;
      const cx = pos[1] * STRIDE + HALF;
      const cy = pos[0] * STRIDE + HALF;
      return `<circle cx="${cx}" cy="${cy}" r="7"
                fill="${color}" opacity="${opacity.toFixed(2)}"/>`;
    }).join('');
  }

  svg.innerHTML =
    circles(s.a1Trail, '#3b82f6') +
    circles(s.a2Trail, '#ea580c');
}

// ── Reward chart ───────────────────────────────────────────────────────────────
// Chart layout constants shared between renderChart and mouse handlers
const CHART = { W:258, H:115, PL:28, PR:6, PT:8, PB:16 };
// Derived helpers (set once cumRewards is available)
let chartFns = null;

function buildChartFns() {
  if (!cumRewards) return;
  const { a1, a2 } = cumRewards;
  const n = a1.length;
  const { W, H, PL, PR, PT, PB } = CHART;
  const pw = W - PL - PR, ph = H - PT - PB;
  const all  = [...a1, ...a2];
  let minV = Math.min(...all, 0), maxV = Math.max(...all, 0);
  if (maxV - minV < 1) { maxV += 0.5; minV -= 0.5; }
  const range = maxV - minV;
  chartFns = {
    n, minV, maxV, range,
    px:  i   => n <= 1 ? PL + pw/2 : PL + (i / (n-1)) * pw,
    py:  val => PT + (1 - (val - minV) / range) * ph,
    // invert px: SVG x → nearest turn index
    xToIdx: x => Math.max(0, Math.min(n-1, Math.round((x - PL) / pw * (n-1)))),
  };
}

function renderChart(idx) {
  const svgEl = document.getElementById('rewardChart');
  if (!cumRewards || maxTurn === 0) { svgEl.innerHTML = ''; return; }

  buildChartFns();
  const { a1, a2 } = cumRewards;
  const { n, minV, maxV } = chartFns;
  const { px, py } = chartFns;
  const { W, H, PL, PR, PT, PB } = CHART;
  const fmt = v => `${v >= 0 ? '+' : ''}${v.toFixed(1)}`;

  function polyline(arr, color) {
    const pts = arr.map((v, i) => `${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(' ');
    return `<polyline points="${pts}" fill="none" stroke="${color}"
              stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  }

  // Zero line
  const zy = py(0);
  const zeroLine = (minV <= 0 && maxV >= 0)
    ? `<line x1="${PL}" y1="${zy.toFixed(1)}" x2="${W-PR}" y2="${zy.toFixed(1)}"
            stroke="#282828" stroke-width="1" stroke-dasharray="3,3"/>`
    : '';

  // Current-turn marker
  const mx  = px(idx);
  const marker = `<line x1="${mx.toFixed(1)}" y1="${PT}"
                        x2="${mx.toFixed(1)}" y2="${H-PB}"
                        stroke="#3a3a3a" stroke-width="1"/>`;

  // Dots at current idx
  const y1c = py(a1[idx]);
  const y2c = py(a2[idx]);
  const dot1 = `<circle cx="${mx.toFixed(1)}" cy="${y1c.toFixed(1)}" r="3" fill="#3b82f6"/>`;
  const dot2 = `<circle cx="${mx.toFixed(1)}" cy="${y2c.toFixed(1)}" r="3" fill="#ea580c"/>`;

  // Value labels at current marker
  const rightHalf = idx >= (n - 1) / 2;
  const anchor    = rightHalf ? 'end' : 'start';
  const xOff      = rightHalf ? -5 : 5;
  const lbl1 = `<text x="${(mx+xOff).toFixed(1)}" y="${(y1c - 4).toFixed(1)}"
                      fill="#60a5fa" font-size="8" font-family="monospace"
                      text-anchor="${anchor}">${fmt(a1[idx])}</text>`;
  const sep   = Math.abs(y1c - y2c);
  const yOff2 = sep < 14 ? 12 : -4;
  const lbl2 = `<text x="${(mx+xOff).toFixed(1)}" y="${(y2c + yOff2).toFixed(1)}"
                      fill="#fb923c" font-size="8" font-family="monospace"
                      text-anchor="${anchor}">${fmt(a2[idx])}</text>`;

  // Axis labels
  const yMax = `<text x="${PL-3}" y="${(py(maxV)+3).toFixed(1)}"
                      fill="#3a3a3a" font-size="8" font-family="monospace"
                      text-anchor="end">${Math.round(maxV)}</text>`;
  const yMin = `<text x="${PL-3}" y="${(py(minV)+3).toFixed(1)}"
                      fill="#3a3a3a" font-size="8" font-family="monospace"
                      text-anchor="end">${Math.round(minV)}</text>`;
  const xL0  = `<text x="${PL}"   y="${H}"
                      fill="#3a3a3a" font-size="8" font-family="monospace"
                      text-anchor="middle">0</text>`;
  const xLN  = `<text x="${W-PR}" y="${H}"
                      fill="#3a3a3a" font-size="8" font-family="monospace"
                      text-anchor="middle">${n-1}</text>`;

  // Transparent hit-area rect on top (mouse events handled in JS)
  const hitRect = `<rect id="chartHit" x="${PL}" y="${PT}" width="${W-PL-PR}" height="${H-PT-PB}"
                         fill="transparent" style="cursor:crosshair"/>`;

  // Hover hairline + tooltip group (initially empty, updated by mouse handler)
  const hoverGroup = `<g id="chartHover"></g>`;

  svgEl.innerHTML =
    zeroLine + marker +
    polyline(a2, '#ea580c') + polyline(a1, '#3b82f6') +
    dot1 + dot2 + lbl1 + lbl2 +
    yMax + yMin + xL0 + xLN +
    hoverGroup + hitRect;
}

// ── Chart mouse interaction ────────────────────────────────────────────────────
(function attachChartEvents() {
  const svgEl = document.getElementById('rewardChart');
  const { W, H, PL, PR, PT, PB } = CHART;
  const fmt = v => `${v >= 0 ? '+' : ''}${v.toFixed(1)}`;

  function svgX(ev) {
    const rect = svgEl.getBoundingClientRect();
    return (ev.clientX - rect.left) * (W / rect.width);
  }

  function showHover(ev) {
    if (!chartFns) return;
    const { a1, a2 } = cumRewards;
    const { px, py, xToIdx } = chartFns;
    const x   = svgX(ev);
    const ti  = xToIdx(x);
    const hx  = px(ti);
    const y1h = py(a1[ti]);
    const y2h = py(a2[ti]);

    // Tooltip position: flip to left side when near right edge
    const tipW = 68, tipH = 34, tipPad = 6;
    const tipX = hx + tipPad + tipW > W - PR ? hx - tipPad - tipW : hx + tipPad;
    const tipY = PT + 2;

    const hairline = `<line x1="${hx.toFixed(1)}" y1="${PT}" x2="${hx.toFixed(1)}" y2="${H-PB}"
                            stroke="#555" stroke-width="1" stroke-dasharray="2,2"/>`;
    const hd1 = `<circle cx="${hx.toFixed(1)}" cy="${y1h.toFixed(1)}" r="3"
                          fill="none" stroke="#60a5fa" stroke-width="1.5"/>`;
    const hd2 = `<circle cx="${hx.toFixed(1)}" cy="${y2h.toFixed(1)}" r="3"
                          fill="none" stroke="#fb923c" stroke-width="1.5"/>`;

    const box  = `<rect x="${tipX.toFixed(1)}" y="${tipY}" width="${tipW}" height="${tipH}"
                        rx="2" fill="#1a1a1a" stroke="#333" stroke-width="1"/>`;
    const tTurn = `<text x="${(tipX+5).toFixed(1)}" y="${tipY+11}"
                         fill="#666" font-size="8" font-family="monospace">turn ${ti}</text>`;
    const tA1   = `<text x="${(tipX+5).toFixed(1)}" y="${tipY+21}"
                         fill="#60a5fa" font-size="8" font-family="monospace">A1 ${fmt(a1[ti])}</text>`;
    const tA2   = `<text x="${(tipX+5).toFixed(1)}" y="${tipY+31}"
                         fill="#fb923c" font-size="8" font-family="monospace">A2 ${fmt(a2[ti])}</text>`;

    const g = document.getElementById('chartHover');
    if (g) g.innerHTML = hairline + hd1 + hd2 + box + tTurn + tA1 + tA2;
  }

  function clearHover() {
    const g = document.getElementById('chartHover');
    if (g) g.innerHTML = '';
  }

  svgEl.addEventListener('mousemove', showHover);
  svgEl.addEventListener('mouseleave', clearHover);
  svgEl.addEventListener('click', ev => {
    if (!chartFns) return;
    const ti = chartFns.xToIdx(svgX(ev));
    goTo(ti);
  });
})();

// ── Turn summary header ────────────────────────────────────────────────────────
function renderSummary(idx) {
  const el = document.getElementById('turnSummary');
  if (idx === 0) { el.innerHTML = 'initial state'; return; }

  const s = makeSummary(validLog[idx - 1]);
  if (!s || !s.ag) { el.innerHTML = '—'; return; }

  const cls = s.ag === 1 ? 'summary-agent1' : 'summary-agent2';
  el.innerHTML = `<span class="${cls}">Agent ${s.ag}</span>&nbsp;${esc(s.text)}`;
}

// ── Info panel ─────────────────────────────────────────────────────────────────
function renderInfo(idx) {
  const panel = document.getElementById('infoPanel');

  if (idx === 0) {
    const ws = worldStates[0];
    panel.innerHTML = `
      <div class="panel-head">INITIAL STATE</div>
      <div class="field"><div class="fl">agent 1</div><div class="fv">position (${ws.a1.join(', ')})</div></div>
      <div class="field"><div class="fl">agent 2</div><div class="fv">position (${ws.a2.join(', ')})</div></div>
      <div class="field"><div class="fl">world</div>
        <div class="fv">Key present · Door locked · ${validLog.length} turns logged</div></div>`;
    return;
  }

  const e    = validLog[idx - 1];
  const r    = typeof e.reward === 'number' ? e.reward : 0;
  const act  = e.action || {};
  const args = act.tool_args || {};
  const inv  = ((e.next_state || {}).inventory || []);
  const pos  = (e.next_state || {}).position;

  // Moment highlight
  const moment = moments.find(m => m.idx === idx);
  const hlHtml = moment
    ? `<div class="hl hl-${moment.type}">${mIcon(moment.type)} ${esc(moment.label)}</div>` : '';

  // Speech bubble — only for send_message
  let bubbleHtml = '';
  if (act.tool_called === 'send_message') {
    bubbleHtml = `
      <div class="field">
        <div class="fl">message</div>
        <div class="speech-bubble">
          <div class="bubble-from">AGENT ${e.agent_id} → AGENT ${args.recipient ?? '?'}</div>
          <div class="bubble-text">${esc(args.message || '')}</div>
        </div>
      </div>`;
  }

  // Args display (skip for message — shown in bubble; skip for no-arg tools)
  const skipArgsFor = new Set(['send_message','look','check_coordinates','check_inventory','pick_up_item']);
  let argsHtml = '';
  if (!skipArgsFor.has(act.tool_called) && Object.keys(args).length) {
    const pairs = Object.entries(args)
      .map(([k,v]) => `<span style="color:var(--dim2)">${k}</span> = ${esc(JSON.stringify(v))}`)
      .join(' &nbsp;·&nbsp; ');
    argsHtml = `<div class="field"><div class="fl">arguments</div><div class="fv">${pairs}</div></div>`;
  }

  // Reasoning (skip if empty)
  const reasoning = (act.reasoning || '').trim();
  const reasonHtml = reasoning
    ? `<div class="field"><div class="fl">reasoning</div><div class="reasoning">${esc(reasoning)}</div></div>`
    : '';

  // Cumulative reward for this agent up to this turn
  let cumR = 0;
  for (let i = 0; i < idx; i++) {
    if (validLog[i].agent_id === e.agent_id) cumR += (validLog[i].reward || 0);
  }
  cumR = round3(cumR);

  const rewardCls  = r >= 0.5 ? 'reward-pos' : 'reward-neg';
  const rewardSign = r >= 0 ? '+' : '';
  const cumSign    = cumR >= 0 ? '+' : '';

  panel.innerHTML = `
    ${hlHtml}
    <div class="panel-head">TURN ${e.turn} &nbsp;·&nbsp; AGENT ${e.agent_id}</div>

    <div class="field">
      <div class="fl">action</div>
      <div class="fv"><span class="badge">${esc(act.tool_called || '—')}</span></div>
    </div>

    ${argsHtml}
    ${bubbleHtml}

    <div class="field">
      <div class="fl">result</div>
      <div class="fv">${esc(e.result || '—')}</div>
    </div>

    <div class="field">
      <div class="fl">reward</div>
      <div class="reward ${rewardCls}">${rewardSign}${r.toFixed(3)}</div>
    </div>

    <div class="field">
      <div class="fl">agent ${e.agent_id} cumulative</div>
      <div class="fv">${cumSign}${cumR.toFixed(2)}</div>
    </div>

    ${reasonHtml}

    <div class="field">
      <div class="fl">position after</div>
      <div class="fv">${pos ? `(${pos.join(', ')})` : '—'}</div>
    </div>

    <div class="field">
      <div class="fl">inventory after</div>
      <div class="fv">${inv.length ? inv.join(', ') : 'empty'}</div>
    </div>`;
}

// ── Key moments sidebar ────────────────────────────────────────────────────────
function renderMoments() {
  const el = document.getElementById('momentsList');
  if (!moments.length) {
    el.innerHTML = '<div class="no-data">None detected.</div>';
    return;
  }
  el.innerHTML = moments.map(m => `
    <div class="mi mi-${m.type} ${currentTurn === m.idx ? 'active' : ''}"
         onclick="goTo(${m.idx})">
      <div class="mi-turn">turn ${m.turn}</div>
      <div>${mIcon(m.type)} ${esc(m.label)}</div>
    </div>`).join('');
}

// ── Auto-play ──────────────────────────────────────────────────────────────────
let playTimer   = null;
let playInterval = 800;

function togglePlay() {
  playTimer ? pause() : play();
}

function play() {
  if (currentTurn >= maxTurn) return;
  document.getElementById('btnPlay').textContent = '⏸ pause';
  playTimer = setInterval(() => {
    if (currentTurn >= maxTurn) { pause(); return; }
    goTo(currentTurn + 1);
  }, playInterval);
}

function pause() {
  clearInterval(playTimer);
  playTimer = null;
  document.getElementById('btnPlay').textContent = '▶ play';
}

function stepAndPause(d) {
  pause();
  goTo(currentTurn + d);
}

function setSpeed(el) {
  playInterval = +el.dataset.ms;
  document.querySelectorAll('.speed-opt').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  // restart the timer at the new interval if already playing
  if (playTimer) { pause(); play(); }
}

// ── Navigation ─────────────────────────────────────────────────────────────────
function goTo(idx) {
  currentTurn = Math.max(0, Math.min(maxTurn, +idx));
  document.getElementById('slider').value = currentTurn;
  document.getElementById('turnLabel').textContent =
    currentTurn === 0 ? 'initial' : `${currentTurn} / ${maxTurn}`;

  const atStart = currentTurn === 0;
  const atEnd   = currentTurn === maxTurn;
  document.getElementById('btnFirst').disabled = atStart;
  document.getElementById('btnPrev').disabled  = atStart;
  document.getElementById('btnNext').disabled  = atEnd;
  document.getElementById('btnLast').disabled  = atEnd;
  if (atEnd && playTimer) pause();

  renderGrid(currentTurn);
  renderChart(currentTurn);
  renderSummary(currentTurn);
  renderInfo(currentTurn);
  renderMoments();
  renderStats(currentTurn);
}

function step(d) { goTo(currentTurn + d); }

// ── Stats bar ──────────────────────────────────────────────────────────────────
function renderStats(idx) {
  const el = document.getElementById('statsBar');
  if (!validLog || !validLog.length || idx === 0) { el.innerHTML = '—'; return; }

  const tools1 = {}, tools2 = {};
  let r1 = 0, r2 = 0;
  const slice = validLog.slice(0, idx);

  for (const e of slice) {
    const t = e.action.tool_called;
    if (e.agent_id === 1) { tools1[t] = (tools1[t] || 0) + 1; r1 = +e.reward + r1; }
    else                  { tools2[t] = (tools2[t] || 0) + 1; r2 = +e.reward + r2; }
  }

  // recompute cumulative rewards correctly (reward is per-turn not cumulative in log)
  r1 = 0; r2 = 0;
  for (const e of slice) {
    if (e.agent_id === 1) r1 += e.reward;
    else                  r2 += e.reward;
  }
  r1 = Math.round(r1 * 100) / 100;
  r2 = Math.round(r2 * 100) / 100;

  const turns1 = slice.filter(e => e.agent_id === 1).length;
  const turns2 = slice.filter(e => e.agent_id === 2).length;
  const eff1 = turns1 ? (r1 / turns1).toFixed(2) : '—';
  const eff2 = turns2 ? (r2 / turns2).toFixed(2) : '—';

  const fmt = (tc) => Object.entries(tc).map(([k,v]) => `${k}×${v}`).join(' ') || '—';

  el.innerHTML =
    `<span class="sl">turns</span> ${idx} &nbsp;` +
    `<span class="va1">A1</span> reward <span class="va1">${r1 >= 0 ? '+' : ''}${r1}</span> eff <span class="va1">${eff1}</span> &nbsp;` +
    `<span class="va2">A2</span> reward <span class="va2">${r2 >= 0 ? '+' : ''}${r2}</span> eff <span class="va2">${eff2}</span><br>` +
    `<span class="sl">A1:</span> <span class="va1">${fmt(tools1)}</span> &nbsp; ` +
    `<span class="sl">A2:</span> <span class="va2">${fmt(tools2)}</span>`;
}

document.addEventListener('keydown', ev => {
  if (ev.target.tagName === 'INPUT') return;
  if (ev.key === 'ArrowLeft')  { ev.preventDefault(); step(-1); }
  if (ev.key === 'ArrowRight') { ev.preventDefault(); step(+1); }
  if (ev.key === 'Home')       { ev.preventDefault(); goTo(0); }
  if (ev.key === 'End')        { ev.preventDefault(); goTo(maxTurn); }
});

// ── Helpers ────────────────────────────────────────────────────────────────────
function clone(o)  { return JSON.parse(JSON.stringify(o)); }
function round3(v) { return Math.round(v * 1000) / 1000; }
function esc(s)    {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function mIcon(t)  { return {key:'🗝',door:'🔓',exit:'🏁',msg:'💬'}[t] || '·'; }

// ── Boot ───────────────────────────────────────────────────────────────────────
(async () => {
  const ld2 = document.getElementById('ld2');
  let raw;
  try {
    const res = await fetch('game_log.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    raw = await res.json();
  } catch (err) {
    document.getElementById('loading').innerHTML = `
      <div style="color:#dc2626">⚠ ${esc(err.message)}</div>
      <div style="font-size:11px;color:var(--dim2);margin-top:6px">
        Serve this folder locally:<br>
        <code>python -m http.server</code>
      </div>`;
    return;
  }

  validLog = raw.filter(e => e.next_state);
  ld2.textContent = `${validLog.length} turns loaded`;

  worldStates = buildWorldStates(validLog);
  cumRewards  = buildCumulativeRewards(validLog);
  moments     = detectMoments(validLog);
  maxTurn     = validLog.length;

  document.getElementById('slider').max = maxTurn;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display     = 'grid';

  goTo(0);
})();
</script>
